# Render Blueprint — Global Bus Rental CRM
# In Render: New + → Blueprint → connect this repo → Apply. Render reads this file
# and provisions the Postgres database + web service, wiring DATABASE_URL automatically.
#
# The web service runs on the paid Starter plan so it is ALWAYS ON — no spin-down /
# cold start — so website lead POSTs and Vonage call webhooks never hit a sleeping
# instance and get dropped. Postgres uses the paid Basic-256MB plan and persists all
# CRM data. (Locally, dev uses embedded-postgres — no Docker — but production always
# uses this managed Render Postgres.)
#
# Note: Render instances have an ephemeral filesystem (no persistent disk needed here —
# all data lives in Postgres; quotes/invoices/POs are generated on the fly, not stored).

databases:
  - name: gbr-crm-db
    plan: basic-256mb
    region: oregon
    databaseName: gbr_crm
    user: gbr_crm

services:
  - type: web
    name: gbr-crm
    runtime: node
    plan: starter
    region: oregon
    # Build. `npm ci --include=dev` is a clean, lockfile-exact install; --include=dev
    # is REQUIRED because NODE_ENV=production (below) otherwise omits devDependencies,
    # but the build/migrate tooling (prisma CLI, typescript, tailwindcss, postcss,
    # autoprefixer, eslint) lives there. They persist into the runtime filesystem so
    # preDeployCommand's `prisma migrate deploy` also resolves.
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    # Pre-deploy (runs after build, BEFORE the new instance serves traffic; on a
    # failure the release is aborted and the old instance keeps running — no data at
    # risk). NO `db push` and NO `--accept-data-loss` anywhere:
    #   1. prisma migrate deploy — apply reviewed, version-controlled migrations only.
    #   2. backfill.js — idempotent: one leg per existing booking, legacy-status
    #      mapping, paid totals recomputed from the ledger.
    #   3. db:seed — production-safe: reference data + a single admin; never resets
    #      or overwrites existing users or operational data.
    # ONE-TIME: production was previously managed by `db push`, so it has no
    # _prisma_migrations table. Before the first deploy, after taking a verified
    # backup, an operator baselines it once:
    #     npx prisma migrate resolve --applied 20260101000000_baseline_production
    # (marks the ALREADY-PRESENT schema as applied; the upgrade migration is NOT
    # marked — migrate deploy applies it). See IMPLEMENTATION-REPORT.md → Deployment.
    preDeployCommand: node scripts/predeploy.js
    # Application start only starts the application.
    startCommand: npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gbr-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # ── Initial administrator bootstrap. Set INITIAL_ADMIN_PASSWORD to a strong
      # secret in the Render dashboard before first deploy; if left blank the seed
      # generates a random password and prints it once to the deploy log. The
      # admin is created only if it does not already exist. ──
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: BASE_CURRENCY
        value: USD
      - key: AI_MODEL
        value: claude-opus-4-8
      - key: FX_PROVIDER
        value: exchangerate-api
      - key: NODE_VERSION
        value: "20"
      # ── Integration keys — leave blank for stub mode; the client can paste real
      # keys into the Render dashboard later (see SETUP-TASKS.html). sync:false keeps
      # them as dashboard-managed secrets rather than blueprint values. ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: VONAGE_APPLICATION_ID
        sync: false
      - key: VONAGE_SIGNATURE_SECRET
        sync: false
      - key: FX_API_KEY
        sync: false
