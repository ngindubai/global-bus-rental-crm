# Render Blueprint — Global Bus Rental CRM
# In Render: New + → Blueprint → connect this repo → Apply. Render reads this file
# and provisions the Postgres database + web service, wiring DATABASE_URL automatically.
#
# The web service runs on the paid Starter plan so it is ALWAYS ON — no spin-down /
# cold start — so website lead POSTs and Vonage call webhooks never hit a sleeping
# instance and get dropped. Postgres uses the paid Basic-256MB plan and persists all
# CRM data. (Locally, dev uses embedded-postgres — no Docker — but production always
# uses this managed Render Postgres.)
#
# Note: Render instances have an ephemeral filesystem (no persistent disk needed here —
# all data lives in Postgres; quotes/invoices/POs are generated on the fly, not stored).

databases:
  - name: gbr-crm-db
    plan: basic-256mb
    region: oregon
    databaseName: gbr_crm
    user: gbr_crm

services:
  - type: web
    name: gbr-crm
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npx prisma generate && npm run build
    # Boot sequence (all steps idempotent, safe to run on every deploy):
    #   1. db push --accept-data-loss — sync the schema. --accept-data-loss is
    #      REQUIRED because the money columns migrate Float→Decimal; the cast
    #      double→numeric(14,2) is lossless (values are preserved exactly), but
    #      Prisma flags every column-type change conservatively. NOTE: this makes
    #      db push apply schema changes non-interactively — the safe long-term path
    #      is `prisma migrate deploy` (see IMPLEMENTATION-REPORT.md → Deployment).
    #   2. backfill.js — one leg per existing booking, map legacy status → the new
    #      independent facts, recompute paid totals from the ledger (idempotent).
    #   3. db:seed — production-safe: reference data + a single admin only.
    startCommand: npx prisma db push --skip-generate --accept-data-loss && node scripts/backfill.js && npm run db:seed && npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gbr-crm-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # ── Initial administrator bootstrap. Set INITIAL_ADMIN_PASSWORD to a strong
      # secret in the Render dashboard before first deploy; if left blank the seed
      # generates a random password and prints it once to the deploy log. The
      # admin is created only if it does not already exist. ──
      - key: INITIAL_ADMIN_EMAIL
        sync: false
      - key: INITIAL_ADMIN_PASSWORD
        sync: false
      - key: BASE_CURRENCY
        value: USD
      - key: AI_MODEL
        value: claude-opus-4-8
      - key: FX_PROVIDER
        value: exchangerate-api
      - key: NODE_VERSION
        value: "20"
      # ── Integration keys — leave blank for stub mode; the client can paste real
      # keys into the Render dashboard later (see SETUP-TASKS.html). sync:false keeps
      # them as dashboard-managed secrets rather than blueprint values. ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: VONAGE_API_KEY
        sync: false
      - key: VONAGE_API_SECRET
        sync: false
      - key: VONAGE_APPLICATION_ID
        sync: false
      - key: VONAGE_SIGNATURE_SECRET
        sync: false
      - key: FX_API_KEY
        sync: false
