name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    # A real PostgreSQL service so Prisma schema validation and any database /
    # concurrency tests run against Postgres rather than a mock.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gbr
          POSTGRES_PASSWORD: gbr_ci_pw
          POSTGRES_DB: gbr_crm_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U gbr"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://gbr:gbr_ci_pw@localhost:5433/gbr_crm_test?schema=public
      JWT_SECRET: ci-test-secret-not-a-real-secret
      BASE_CURRENCY: USD
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma schema validate
        run: npx prisma validate

      - name: Apply migrations to test database (validates the migration chain)
        run: npx prisma migrate deploy

      - name: Fail on schema drift (migrations must match schema.prisma)
        run: |
          npx prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --exit-code && echo "No drift" || { echo "Schema drift - migrations do not match schema.prisma"; exit 1; }

      - name: Backfill (idempotent) — run twice to prove idempotency
        run: node scripts/backfill.js && node scripts/backfill.js

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit / integration tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Dependency audit (production, no high/critical)
        run: npm audit --omit=dev --audit-level=high
